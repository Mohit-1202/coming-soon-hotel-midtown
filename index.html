<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Midtown | Our Website is Under Maintenance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-overlay"></div>

    <header>
        <div class="social-icons">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-google-plus-g"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </header>

    <main class="content">
        <p class="hotel-name">HOTEL MIDTOWN</p>
        <h1 class="main-title">CURRENTLY UNDER MAINTENANCE</h1>
        <button id="enquire-now-btn" class="book-now-btn">ENQUIRE NOW</button>

        <div class="divider-container">
            <div class="divider"></div>
        </div>

        <div class="bottom-section">
            <div class="countdown-container">
                <p class="section-label launching-text">WE WILL BE BACK IN..</p>
                <div class="countdown">
                    <div class="time-box">
                        <span id="days">00</span>
                        <p>DAYS</p>
                    </div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <p>HOURS</p>
                    </div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <p>MINUTES</p>
                    </div>
                    <div class="time-box highlight">
                        <span id="seconds">00</span>
                        <p>SECONDS</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-divider"></div>
    </main>

    <!-- Enquiry Modal -->
    <div id="enquiry-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 class="modal-title">ENQUIRE NOW</h2>
            
            <div class="contact-option">
                <span class="contact-number">8001007722</span>
                <div class="contact-actions">
                    <a href="tel:8001007722" class="action-btn btn-call">
                        <i class="fas fa-phone"></i> CALL
                    </a>
                    <a href="https://wa.me/918001007722" target="_blank" class="action-btn btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> WHATSAPP
                    </a>
                </div>
            </div>

            <div class="contact-option">
                <span class="contact-number">8001007744</span>
                <div class="contact-actions">
                    <a href="tel:8001007744" class="action-btn btn-call">
                        <i class="fas fa-phone"></i> CALL
                    </a>
                    <a href="https://wa.me/918001007744" target="_blank" class="action-btn btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> WHATSAPP
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
